# Infrastructure locale pour le développement.
# En production : Azure Database for PostgreSQL Flexible Server + Azure Cache for Redis.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wasel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wasel_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-wasel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - wasel_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wasel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - wasel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wasel_postgres_data:
  wasel_redis_data:
